<!DOCTYPE html>
<html lang="ca">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Alta Personal</title>
	<link rel="stylesheet" href="/css/alta_personal.css">
</head>
<body>
	<main class="page">
		<section class="personal-card" aria-labelledby="personal-title">
			<h1 id="personal-title">Alta de Personal</h1>
			<p class="subtitle">Introdueix totes les dades requerides de la taula personal.</p>

			{% if error %}
			<p class="message error" role="alert">{{ error }}</p>
			{% endif %}

			{% if success %}
			<p class="message success" role="status">{{ success }}</p>
			{% endif %}

			<form class="personal-form" action="/personal/alta" method="post" enctype="multipart/form-data">
				<label for="nom">Nom</label>
				<input id="nom" name="nom" type="text" maxlength="50" required>

				<label for="cognom">Primer cognom</label>
				<input id="cognom" name="cognom" type="text" maxlength="50" required>

				<label for="cognom2">Segon cognom</label>
				<input id="cognom2" name="cognom2" type="text" maxlength="50" required>

				<label for="data_naixement">Data de naixement</label>
				<input id="data_naixement" name="data_naixement" type="date" required>

				<label for="telefon">Telefon principal</label>
				<input id="telefon" name="telefon" type="tel" maxlength="15" required>

				<label for="telefon2">Telefon secundari</label>
				<input id="telefon2" name="telefon2" type="tel" maxlength="15">

				<label for="email">Email personal</label>
				<input id="email" name="email" type="email" maxlength="100" required>

				<label for="email_intern">Email intern</label>
				<input id="email_intern" name="email_intern" type="email" maxlength="100" required>

				<label for="dni">DNI</label>
				<input id="dni" name="dni" type="text" maxlength="20" required>

				<label for="tipus_feina">Tipus de feina</label>
				<select id="tipus_feina" name="tipus_feina" required>
					<option value="" disabled selected>Selecciona un tipus de feina</option>
					<option value="metge">Metge</option>
					<option value="infermer">Infermer</option>
					<option value="administratiu">Administratiu</option>
					<option value="tècnic">Tècnic</option>
					<option value="personal neteja">Personal neteja</option>
					<option value="personal seguretat">Personal seguretat</option>
					<option value="personal cuina">Personal cuina</option>
				</select>

				<div id="dinamic-container" class="dynamic-fields" hidden></div>

				<label for="data_alta">Data d'alta</label>
				<input id="data_alta" name="data_alta" type="date" required>

				<button type="submit">Donar d'alta</button>
			</form>

			<a class="back-link" href="/home">Tornar al menu</a>
		</section>
	</main>
	<script>
		const dataAltaInput = document.getElementById('data_alta');
		if (dataAltaInput && !dataAltaInput.value) {
			const avui = new Date().toISOString().split('T')[0];
			dataAltaInput.value = avui;
		}

		const container = document.getElementById('dinamic-container');
		const select = document.getElementById('tipus_feina');

		const renderDynamicFields = () => {
			container.innerHTML = '';
			container.hidden = select.value !== 'metge';

			if (select.value !== 'metge') {
				return;
			}

			const wrapper = document.createElement('div');
			wrapper.className = 'dynamic-group';

			const especialitatLabel = document.createElement('label');
			especialitatLabel.setAttribute('for', 'especialitat');
			especialitatLabel.textContent = 'Especialitat';

			const especialitatInput = document.createElement('input');
			especialitatInput.setAttribute('id', 'especialitat');
			especialitatInput.setAttribute('name', 'especialitat');
			especialitatInput.setAttribute('type', 'text');
			especialitatInput.setAttribute('maxlength', '50');
			especialitatInput.setAttribute('required', 'required');

			const cvLabel = document.createElement('label');
			cvLabel.setAttribute('for', 'cv');
			cvLabel.textContent = 'CV';

			const cvInput = document.createElement('input');
			cvInput.setAttribute('id', 'cv');
			cvInput.setAttribute('name', 'cv');
			cvInput.setAttribute('type', 'file');
			cvInput.setAttribute('accept', '.pdf,.doc,.docx');
			cvInput.setAttribute('required', 'required');

			wrapper.appendChild(especialitatLabel);
			wrapper.appendChild(especialitatInput);
			wrapper.appendChild(cvLabel);
			wrapper.appendChild(cvInput);
			container.appendChild(wrapper);
		};

		select.addEventListener('change', renderDynamicFields);
		renderDynamicFields();

        
	</script>
</body>
</html>
